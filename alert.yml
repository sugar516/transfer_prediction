name: Daily Transfer Market Alert Pipeline

# 🌟 いつ実行するかを設定（Cronジョブ）
on:
  schedule:
    # 毎日日本時間の午前7:00（UTCの22:00）に自動起動
    - cron: '0 22 * * *'
  # GitHubの画面から「手動で今すぐ実行」もできるようにするボタン
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest # 完全無料のLinuxサーバーを毎朝召喚

    steps:
    # 1. GitHub上のリポジトリ（コードやCSV）をサーバーに展開
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Python環境のセットアップ
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 必要なライブラリ（LightGBMやPandas）を爆速インストール
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. 🌟 予測＆アラート送信スクリプトを実行！
    - name: Run Prediction Pipeline
      run: |
        python predict_pipeline.py
