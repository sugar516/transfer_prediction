name: Daily Alert

on:
  schedule:
    - cron: '0 22 * * *' # 毎日日本時間 朝7:00に起動
  workflow_dispatch: # 手動実行ボタンを有効化

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Kaggle CLIのインストールを追加
        pip install kaggle
        pip install -r requirements.txt

    # 🌟 【新設】Kaggleから最新のTransfermarktデータを自動でストリーミングダウンロードするステップ
    - name: Download latest Transfermarkt data from Kaggle
      env:
        KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
        KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
      run: |
        # Kaggleのデータセット（davidcariboo/player-scores）を、Pythonプログラムが読み込める場所にキャッシュ
        # ※ kagglehubが内部で使用するキャッシュパス（~/.cache/kagglehub）に直接ダウンロード・展開を行います
        python -c "import kagglehub; kagglehub.dataset_download('davidcariboo/player-scores')"

    # 🌟 予測パイプラインの実行（スプレッドシート書き込み用の環境変数もバインド）
    - name: Run Prediction
      env:
        LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
      run: |
        python predicting.py
